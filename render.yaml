databases:
  - name: listedbelowdb
    plan: free
    databaseName: listedbelow
    user: listedbelow

services:
  - type: web
    plan: free
    name: listedbelow
    runtime: python
    pythonVersion: "3.13.2"
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn listedbelow.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: listedbelowdb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4