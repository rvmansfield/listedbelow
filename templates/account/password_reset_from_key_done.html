{% extends "base.html" %}

{% block title %}Password Changed — ListedBelow{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center mt-5">
      <i class="bi bi-check-circle display-1 text-success"></i>
      <h2 class="mt-3">Password changed!</h2>
      <p class="text-muted">Your password has been updated. You can now sign in.</p>
      <a href="{% url 'account_login' %}" class="btn btn-primary mt-2">Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
