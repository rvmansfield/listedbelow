{% extends "base.html" %}

{% block title %}Edit {{ music_list.title }} — ListedBelow{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2 class="mb-4"><i class="bi bi-pencil text-primary"></i> Edit List</h2>
      <div class="card border-secondary">
        <div class="card-body p-4">
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">List Name *</label>
              {{ form.title }}
              {% if form.title.errors %}
              <div class="text-danger small">{{ form.title.errors }}</div>
              {% endif %}
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              {{ form.description }}
            </div>
            <div class="d-flex gap-2 mt-4">
              <button type="submit" class="btn btn-primary px-4">Save Changes</button>
              <a href="{% url 'list_detail' pk=music_list.pk %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
